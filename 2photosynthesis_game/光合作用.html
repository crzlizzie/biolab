<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="F&R">
    <title>光合作用互动游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>光合作用互动游戏</h1>
            <p>通过调整环境条件，观察光合作用过程中相关物质的变化</p>
        </header>
        
        <main>
            <div class="mode-selector">
                <button id="practice-mode">练习模式</button>
                <button id="challenge-mode">挑战模式</button>
            </div>
            
            <div id="game-container" class="hidden">
                <!-- 游戏内容将通过JavaScript动态生成 -->
            </div>
        </main>
        
        <footer>
            <p style="font-size:14px;">© 2026 光合作用互动游戏 | 作者：冯海倩、任姬</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
