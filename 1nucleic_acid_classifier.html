<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="F&R">
    <title>核酸成分分类挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header p {
            color: #7f8c8d;
            line-height: 1.6;
            font-size: 1.1em;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .components-pool {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .components-pool h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .components-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .component {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: grab;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            user-select: none;
        }

        .component:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .component.dragging {
            opacity: 0.7;
            transform: scale(1.05);
        }

        .component-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 8px;
        }

        .component-name {
            font-weight: bold;
            font-size: 0.9em;
        }

        .classification-area {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .classification-area h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .classification-boxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 400px;
        }

        .classification-box {
            border: 3px dashed #bdc3c7;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            min-height: 350px;
        }

        .classification-box.dna {
            border-color: #3498db;
        }

        .classification-box.rna {
            border-color: #e74c3c;
        }

        .classification-box.drag-over {
            background-color: #ecf0f1;
            border-style: solid;
        }

        .classification-box.correct {
            border-color: #27ae60;
            background-color: #d5f4e6;
        }

        .classification-box h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .nucleotide-template {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #95a5a6;
            border-radius: 8px;
        }

        .slot {
            height: 60px;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }

        .slot.filled {
            border-color: #27ae60;
            background-color: #d5f4e6;
        }

        .component-container {
            min-height: 300px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
        }

        .hint {
            color: #95a5a6;
            font-style: italic;
            text-align: center;
            width: 100%;
            margin-top: 100px;
        }

        .component-container .component {
            width: 80px;
            height: 80px;
            padding: 8px;
            font-size: 0.8em;
        }

        .component-container .component-icon {
            width: 40px;
            height: 40px;
            font-size: 1.2em;
        }

        .feedback-panel {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: 700px;
            display: flex;
            flex-direction: column;
        }

        .feedback-panel h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .feedback-messages-container {
            flex: 1;
            overflow-y: auto;
            height: 650px;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            padding: 10px;
        }

        .feedback-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-align: left;
            border-left: 4px solid transparent;
        }

        .feedback-message.success {
            background-color: #d5f4e6;
            color: #27ae60;
            border-left-color: #27ae60;
        }

        .feedback-message.error {
            background-color: #fadbd8;
            color: #e74c3c;
            border-left-color: #e74c3c;
        }

        .feedback-message:last-child {
            margin-bottom: 0;
        }

        /* 滚动条样式 */
        .feedback-messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .feedback-messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .feedback-messages-container::-webkit-scrollbar-thumb {
            background: #bdc3c7;
            border-radius: 4px;
        }

        .feedback-messages-container::-webkit-scrollbar-thumb:hover {
            background: #95a5a6;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f39c12;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .progress-bar {
            background: #ecf0f1;
            height: 20px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        .reset-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .component-type {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* 组件颜色定义 */
        .phosphate { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .deoxyribose { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .ribose { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .adenine { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
        .guanine { background: linear-gradient(135deg, #1abc9c, #16a085); color: white; }
        .cytosine { background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; }
        .thymine { background: linear-gradient(135deg, #e67e22, #d35400); color: white; }
        .uracil { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 核酸成分分类挑战</h1>
            <p>核酸由核苷酸组成。核苷酸由一分子磷酸、一分子五碳糖和一分子含氮碱基构成。根据五碳糖的不同，分为脱氧核糖核苷酸（DNA的基本单位）和核糖核苷酸（RNA的基本单位）。</p>
            <p><strong>挑战任务：</strong> 请将核酸成分正确分类到DNA和RNA框中。注意：磷酸和A、G、C碱基是DNA和RNA共有的成分，可以拖拽到任意一个框中进行对比学习！</p>
        </div>

        <div class="game-area">
            <!-- 分子零件素材库 -->
            <div class="components-pool">
                <h2>🧩 分子零件素材库</h2>
                <div class="components-grid" id="componentsGrid">
                    <!-- 组件将通过JavaScript动态生成 -->
                </div>
            </div>

            <!-- 概念框分类区域 -->
            <div class="classification-area">
                <h2>📋 概念分类区</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="classification-boxes">
                    <div class="classification-box dna" id="dnaBox" data-type="dna">
                        <h3>🧬 DNA成分</h3>
                        <div class="component-container" id="dnaContainer">
                            <p class="hint">将属于DNA的成分拖拽到这里</p>
                        </div>
                    </div>
                    <div class="classification-box rna" id="rnaBox" data-type="rna">
                        <h3>🔬 RNA成分</h3>
                        <div class="component-container" id="rnaContainer">
                            <p class="hint">将属于RNA的成分拖拽到这里</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 反馈面板 -->
            <div class="feedback-panel">
                <h2>💡 学习反馈</h2>
                <div class="feedback-messages-container" id="feedbackMessages">
                    <p style="text-align: center; color: #95a5a6; font-style: italic;">拖拽组件开始学习...</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="reset-btn" onclick="resetGame()">🔄 重新开始挑战</button>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        // 核酸成分数据结构定义（修正科学性错误）
        const nucleicAcidComponents = [
            // 磷酸基团（DNA和RNA共有）
            { id: 'phosphate', name: '磷酸基团', type: 'common', belongsTo: ['dna', 'rna'], colorClass: 'phosphate', symbol: 'P' },
            
            // 五碳糖
            { id: 'deoxyribose', name: '脱氧核糖', type: 'sugar', belongsTo: ['dna'], colorClass: 'deoxyribose', symbol: 'D' },
            { id: 'ribose', name: '核糖', type: 'sugar', belongsTo: ['rna'], colorClass: 'ribose', symbol: 'R' },
            
            // 共有碱基（DNA和RNA都含有）
            { id: 'adenine', name: '腺嘌呤(A)', type: 'common_base', belongsTo: ['dna', 'rna'], colorClass: 'adenine', symbol: 'A' },
            { id: 'guanine', name: '鸟嘌呤(G)', type: 'common_base', belongsTo: ['dna', 'rna'], colorClass: 'guanine', symbol: 'G' },
            { id: 'cytosine', name: '胞嘧啶(C)', type: 'common_base', belongsTo: ['dna', 'rna'], colorClass: 'cytosine', symbol: 'C' },
            
            // 特有碱基
            { id: 'thymine', name: '胸腺嘧啶(T)', type: 'unique_base', belongsTo: ['dna'], colorClass: 'thymine', symbol: 'T' },
            { id: 'uracil', name: '尿嘧啶(U)', type: 'unique_base', belongsTo: ['rna'], colorClass: 'uracil', symbol: 'U' }
        ];

        // 游戏状态（修正为成分分类）
        let gameState = {
            dnaComponents: [],
            rnaComponents: [],
            score: 0,
            maxScore: 8 // 总共8个组件需要正确分类
        };

        // 初始化游戏
        function initGame() {
            createComponents();
            setupEventListeners();
            updateProgress();
        }

        // 创建分子零件
        function createComponents() {
            const grid = document.getElementById('componentsGrid');
            grid.innerHTML = '';
            
            nucleicAcidComponents.forEach(component => {
                const componentElement = document.createElement('div');
                componentElement.className = `component ${component.colorClass}`;
                componentElement.id = component.id;
                componentElement.draggable = true;
                componentElement.setAttribute('data-component', JSON.stringify(component));
                
                componentElement.innerHTML = `
                    <div class="component-icon">${component.symbol}</div>
                    <div class="component-name">${component.name}</div>
                `;
                
                grid.appendChild(componentElement);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 拖拽开始事件
            document.addEventListener('dragstart', function(e) {
                if (e.target.classList.contains('component')) {
                    e.target.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.dataTransfer.effectAllowed = 'move';
                }
            });

            // 拖拽结束事件
            document.addEventListener('dragend', function(e) {
                if (e.target.classList.contains('component')) {
                    e.target.classList.remove('dragging');
                }
            });

            // 拖拽进入分类框事件
            const boxes = document.querySelectorAll('.classification-box');
            boxes.forEach(box => {
                box.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('drag-over');
                });

                box.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });

                box.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    
                    const componentId = e.dataTransfer.getData('text/plain');
                    const componentElement = document.getElementById(componentId);
                    const componentData = JSON.parse(componentElement.getAttribute('data-component'));
                    const boxType = this.getAttribute('data-type');
                    
                    handleDrop(componentElement, componentData, boxType, this);
                });
            });
        }

        // 处理拖拽放置
        function handleDrop(componentElement, componentData, boxType, boxElement) {
            // 检查放置是否正确
            const isValid = validatePlacement(componentData, boxType);
            
            if (isValid) {
                // 正确放置
                handleCorrectPlacement(componentElement, componentData, boxType, boxElement);
            } else {
                // 错误放置
                handleIncorrectPlacement(componentData, boxType);
            }
        }

        // 验证放置是否正确
        function validatePlacement(componentData, boxType) {
            // 共有成分（磷酸和共有碱基）可以放置到任意框中
            if (componentData.type === 'common' || componentData.type === 'common_base') {
                return true;
            }
            // 特有成分只能放置到对应的框中
            return componentData.belongsTo.includes(boxType);
        }

        // 处理正确放置
        function handleCorrectPlacement(componentElement, componentData, boxType, boxElement) {
            // 检查是否已经放置过该组件到当前框中
            if (gameState[boxType + 'Components'].includes(componentData.id)) {
                showFeedback('该组件已经放置到这个框中了！', 'error');
                return;
            }

            // 更新游戏状态
            gameState[boxType + 'Components'].push(componentData.id);
            
            // 对于特有成分，完成放置后计分；对于共有成分，需要放置到两个框才计分
            if (componentData.type === 'sugar' || componentData.type === 'unique_base') {
                gameState.score++;
            } else {
                // 共有成分：检查是否已经放置到另一个框中
                const otherBoxType = boxType === 'dna' ? 'rna' : 'dna';
                if (gameState[otherBoxType + 'Components'].includes(componentData.id)) {
                    gameState.score++;
                }
            }
            
            // 创建组件副本并添加到分类框
            const clonedComponent = componentElement.cloneNode(true);
            clonedComponent.style.cursor = 'default';
            clonedComponent.draggable = false;
            
            // 添加到对应的容器
            const container = boxElement.querySelector('.component-container');
            const hint = container.querySelector('.hint');
            if (hint) {
                hint.remove();
            }
            container.appendChild(clonedComponent);
            
            // 显示成功反馈
            let feedbackMessage = `✅ 正确！${componentData.name}属于${boxType.toUpperCase()}的成分`;
            if (componentData.type === 'common') {
                feedbackMessage += '（DNA和RNA共有，可以拖拽到任意框中）';
            } else if (componentData.type === 'common_base') {
                feedbackMessage += '（DNA和RNA都含有，可以拖拽到任意框中）';
            } else if (componentData.type === 'unique_base') {
                feedbackMessage += '（' + (boxType === 'dna' ? 'DNA特有' : 'RNA特有') + '）';
            }
            showFeedback(feedbackMessage, 'success');
            
            // 添加视觉反馈
            boxElement.classList.add('correct');
            setTimeout(() => boxElement.classList.remove('correct'), 1000);
            
            // 更新进度
            updateProgress();
            
            // 检查是否完成挑战
            checkCompletion();
        }

        // 处理错误放置
        function handleIncorrectPlacement(componentData, boxType) {
            let errorMessage = '';
            
            if (componentData.type === 'sugar') {
                if (componentData.id === 'ribose') {
                    errorMessage = '❌ 错误！核糖是RNA的五碳糖，DNA的五碳糖是脱氧核糖。';
                } else {
                    errorMessage = '❌ 错误！脱氧核糖是DNA的五碳糖，RNA的五碳糖是核糖。';
                }
            } else if (componentData.type === 'unique_base') {
                if (componentData.id === 'uracil') {
                    errorMessage = '❌ 错误！DNA的碱基是A、T、G、C，不含U；U是RNA特有的碱基。';
                } else if (componentData.id === 'thymine') {
                    errorMessage = '❌ 错误！RNA的碱基是A、U、G、C，不含T；T是DNA特有的碱基。';
                }
            } else {
                errorMessage = `❌ 错误！${componentData.name}不能放置到${boxType.toUpperCase()}框中。`;
            }
            
            showFeedback(errorMessage, 'error');
        }

        // 显示反馈信息
        function showFeedback(message, type) {
            const feedbackContainer = document.getElementById('feedbackMessages');
            
            // 移除初始提示信息
            const initialHint = feedbackContainer.querySelector('p');
            if (initialHint) {
                initialHint.remove();
            }
            
            const messageElement = document.createElement('div');
            messageElement.className = `feedback-message ${type}`;
            messageElement.textContent = message;
            
            feedbackContainer.appendChild(messageElement);
            
            // 自动滚动到底部
            feedbackContainer.scrollTop = feedbackContainer.scrollHeight;
        }

        // 更新进度条
        function updateProgress() {
            const progressFill = document.getElementById('progressFill');
            const progress = (gameState.score / gameState.maxScore) * 100;
            progressFill.style.width = `${progress}%`;
        }

        // 检查是否完成挑战
        function checkCompletion() {
            if (gameState.score === gameState.maxScore) {
                setTimeout(() => {
                    showFeedback('🎉 恭喜！你成功完成了核酸成分分类挑战！你已经掌握了DNA和RNA的基本组成成分！', 'success');
                    createCelebration();
                }, 500);
            }
        }

        // 创建庆祝动画
        function createCelebration() {
            const celebration = document.getElementById('celebration');
            celebration.style.display = 'block';
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.backgroundColor = getRandomColor();
                celebration.appendChild(confetti);
            }
            
            setTimeout(() => {
                celebration.style.display = 'none';
                celebration.innerHTML = '';
            }, 3000);
        }

        // 获取随机颜色
        function getRandomColor() {
            const colors = ['#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#1abc9c'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 重置游戏
        function resetGame() {
            // 重置游戏状态
            gameState = {
                dnaComponents: [],
                rnaComponents: [],
                score: 0,
                maxScore: 8
            };
            
            // 清空反馈消息
            document.getElementById('feedbackMessages').innerHTML = '';
            
            // 重置进度条
            updateProgress();
            
            // 清空分类框中的组件
            const dnaContainer = document.getElementById('dnaContainer');
            const rnaContainer = document.getElementById('rnaContainer');
            
            dnaContainer.innerHTML = '<p class="hint">将属于DNA的成分拖拽到这里</p>';
            rnaContainer.innerHTML = '<p class="hint">将属于RNA的成分拖拽到这里</p>';
            
            showFeedback('游戏已重置，请重新开始挑战！', 'success');
        }

        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
<div style="text-align:center;padding:12px;color:#999;font-size:14px;">作者：冯海倩、任姬</div>
